services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/New_York
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=scm
      - POSTGRES_PASSWORD=scm_password
      - POSTGRES_DB=supplychain
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=scm
      - MB_DB_PASS=scm_password
      - MB_DB_HOST=postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - postgres

volumes:
  n8n_data:
  pg_data:
  metabase_data: